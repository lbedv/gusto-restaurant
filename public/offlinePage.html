<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Restaurace Gusto</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #f8f5f0;
      color: #2c1c15;
    }
    header {
      background-color: #a06746;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .message {
      margin: 2rem 0;
      max-width: 500px;
      line-height: 1.5;
    }
    .button {
      display: inline-block;
      background-color: #a06746;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.3s;
    }
    .button:hover {
      background-color: #815135;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Gusto</div>
    <div>Restaurace</div>
  </header>
  
  <main>
    <h1>Jste offline</h1>
    
    <div class="message">
      <p>Vypadá to, že nemáte připojení k internetu. Některé funkce aplikace nemusí být dostupné.</p>
      <p>Zkontrolujte své internetové připojení a zkuste to znovu.</p>
    </div>
    
    <a href="." class="button">Zkusit znovu</a>
  </main>
</body>
</html>
